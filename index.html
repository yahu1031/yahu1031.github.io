<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Yaswanth Kumar Rajavarapu — Flutter & Dart developer, "
    "Flutter Hyderabad community lead."
  >
  <title>Mr.Minnu</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('theme-pref') || 'system';
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolved =
          pref === 'light' ? 'light' : pref === 'dark' ? 'dark' : dark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.setAttribute('data-theme-pref', pref);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.setAttribute('data-theme-pref', 'system');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
  <script defer src="main.dart.js"></script>
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite"></div>
</body>
</html>
